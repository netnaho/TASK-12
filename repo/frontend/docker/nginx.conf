server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   1000;
    gzip_proxied      any;
    gzip_vary         on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        text/xml
        application/xml
        application/xml+rss
        image/svg+xml;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"            always;
    add_header X-Content-Type-Options "nosniff"               always;
    add_header X-XSS-Protection       "1; mode=block"         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── SPA routing: serve index.html for all non-asset routes ───────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ── Immutable static assets (Vite hashes filenames) ──────────────────────
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
    }

    # ── API proxy → backend container ────────────────────────────────────────
    # All requests starting with /api/ are forwarded to the Express server.
    # The URI is preserved (no trailing slash on proxy_pass).
    location /api/ {
        proxy_pass         http://leaseops-backend:3000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts: allow up to 60 s for long-running API calls (exports, etc.)
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        # Disable buffering for SSE / streaming responses
        proxy_buffering off;
    }

    # ── Health probe (nginx-level) ────────────────────────────────────────────
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
